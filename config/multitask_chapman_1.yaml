# config.yaml

data:
  train_csv: "./dataset_preprocess/chapman/fold_5_train.csv"
  val_csv: "./dataset_preprocess/chapman/test.csv"
  test_csv: "./dataset_preprocess/chapman/test.csv"
  data_root_dir: "/home/oyxq/PythonProjects/dataset/Chapman/PTDB"

model:
